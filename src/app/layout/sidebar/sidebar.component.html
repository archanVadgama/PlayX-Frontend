<div>
    <!-- Off-canvas menu for mobile -->
    <div *ngIf="isSidebarOpen" class="fixed inset-0 flex z-40 md:hidden" role="dialog" aria-modal="true">
      <!-- Overlay -->
      <div class="fixed inset-0 bg-gray-600 bg-opacity-75" aria-hidden="true"></div>
  
      <!-- Sidebar panel -->
      <div class="relative flex-1 flex flex-col max-w-xs w-full pt-5 pb-4 bg-white">
        <div class="absolute top-0 right-0 -mr-12 pt-2">
          <button (click)="close()" type="button"
            class="ml-1 flex items-center justify-center h-10 w-10 rounded-full focus:outline-none focus:ring-2 focus:ring-inset focus:ring-white">
            <span class="sr-only">Close sidebar</span>
            <!-- Heroicon: close (X) -->
            <svg class="h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
  
        <div class="flex-shrink-0 flex items-center px-4">
          <img class="h-8 w-auto" src="images/logo.png" alt="PlayX">
        </div>
  
        <div class="mt-5 flex-1 h-0 overflow-y-auto">
          <nav class="px-2 space-y-1">
            <ng-container *ngFor="let item of isAdmin ? adminMenuItems : userMenuItems">
              <a [routerLink]="[item.route]" routerLinkActive="bg-gray-100 text-gray-900"
                class="text-gray-600 hover:bg-gray-50 hover:text-gray-900 group flex items-center px-2 py-2 text-sm font-medium rounded-md">
                <span [innerHTML]="item.icon" class="mr-2"></span>
                {{ item.name }}
              </a>
            </ng-container>
          </nav>
        </div>
      </div>
  
      <!-- Dummy to force sidebar to fit close icon -->
      <div class="flex-shrink-0 w-14" aria-hidden="true"></div>
    </div>
  
    <!-- Static sidebar for desktop -->
    <div class="hidden md:flex md:w-64 md:flex-col md:fixed md:inset-y-0">
      <div class="flex flex-col flex-grow border-r border-gray-200 pt-5 bg-white overflow-y-auto">
        <div class="flex items-center flex-shrink-0 px-4">
          <img class="h-8 w-auto" src="images/logo.png" alt="PlayX">
        </div>
        <div class="mt-5 flex-grow flex flex-col">
          <nav class="flex-1 px-2 pb-4 space-y-1">
            <ng-container *ngFor="let item of isAdmin ? adminMenuItems : userMenuItems">
              <a [routerLink]="[item.route]" routerLinkActive="bg-gray-100 text-gray-900" (click)="checkAdmin()"
                class="text-gray-600 hover:bg-gray-50 hover:text-gray-900 group flex items-center px-2 py-2 text-sm font-medium rounded-md">
                <span [innerHTML]="item.icon" class="mr-2"></span>
                {{ item.name }}
              </a>
            </ng-container>
          </nav>
        </div>
      </div>
    </div>
  </div>
