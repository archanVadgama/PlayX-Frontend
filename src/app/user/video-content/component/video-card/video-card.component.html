<div
    class="relative bg-white rounded-xl shadow-sm hover:shadow-lg transition-transform duration-300 cursor-pointer z-10">
    <!-- Video -->
     <!-- //! fix this to 16/9 -->
    <div class="relative w-full">
        <video [id]="'video-' + uuid"
            class="w-full aspect-[16/7] object-cover transition-all duration-500 rounded-t-xl" [src]="videoUrl"
            autoplay muted controls loop playsinline>
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Content -->
    <div class="p-3">
        <div class="flex items-start justify-between">
            <div class="flex items-start gap-3">
                <img [src]="profileImage || 'images/default_user.jpg'"
                    alt="Profile" class="w-10 h-10 object-cover rounded-full" />
                <div>
                    <h3 class="text-sm font-semibold line-clamp-2">{{ title }}</h3>
                    <!-- <p class="text-xs text-gray-600 mt-0.5">{{ channelName }}</p> -->
                    <p class="text-xs text-gray-500">{{ views }} views • {{ createdAt }}</p>
                </div>
            </div>

            <!-- Three Dots Menu -->
            <div class="relative shrink-0 ml-2">
                <button type="button" class="p-1 rounded-full hover:bg-gray-300 transition-colors duration-200"
                    (click)="toggleMenu($event)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-600" fill="none"
                        viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z" />
                    </svg>
                </button>

                <!-- Dropdown Menu -->
                @if(menuOpen){

                <div class="absolute right-0 top-4 mt-2 w-44 bg-white border border-gray-200 rounded-lg shadow-xl z-50">
                    <button type="button"
                        class="flex items-center w-full px-4 py-2 text-sm text-left text-gray-700 hover:bg-gray-100 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24"
                            stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 3v1.5M3 21v-6m0 0l2.77-.693a9 9 0 016.208.682l.108.054a9 9 0 006.086.71l3.114-.732a48.524 48.524 0 01-.005-10.499l-3.11.732a9 9 0 01-6.085-.711l-.108-.054a9 9 0 00-6.208-.682L3 4.5M3 15V4.5" />
                        </svg>
                        Report Video
                    </button>
                    <button type="button"
                        class="flex items-center w-full px-4 py-2 text-sm text-left text-gray-700 hover:bg-gray-100 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24"
                            stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 0 2.25 2.25 0 00-3.935 0z" />
                        </svg>
                        Share
                    </button>
                </div>
                }

            </div>
        </div>
    </div>
</div>
