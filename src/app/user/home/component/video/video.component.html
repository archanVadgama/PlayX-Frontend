<div class="py-6">
    <div class="max-w-8xl mx-auto px-4 sm:px-6 md:px-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
            <div *ngFor="let videoItem of videos; let i = index"
                class="bg-white rounded-lg overflow-hidden text-black transition-all transform duration-500 hover:scale-[1.03] hover:bg-gray-100 cursor-pointer"
                (mouseenter)="onMouseEnter(i)" (mouseleave)="onMouseLeave(i)">
                <div class="relative">
                    <!-- Video -->
                    <video *ngIf="hoveredIndex === i" id="video-{{i}}" class="w-full h-auto object-cover rounded-lg transition-all duration-500"
                        muted preload="metadata">
                        <source [src]="videoItem.src" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>

                    <!-- Image -->
                    <img *ngIf="hoveredIndex !== i"
                    src="{{videoItem.thumbnail}}"
                        alt="Video Thumbnail" class="w-full h-auto object-cover rounded-lg transition-all duration-500" />

                    <span *ngIf="hoveredIndex !== i"
                        class="absolute bottom-2 right-2 bg-black bg-opacity-70 text-xs px-1.5 py-0.5 rounded text-white">
                        {{videoItem.duration}}
                    </span>

                </div>
                <div class="flex items-start space-x-3 p-3">
                    <img src="{{videoItem.profileImg}}"
                        class="w-10 h-10 rounded-full object-cover" />
                    <div class="flex-1">
                        <!-- Title + Three Dots in one row -->
                        <div class="flex justify-between items-start">
                            <h3 class="text-sm font-semibold leading-tight line-clamp-2 pr-2">{{ videoItem.title }}</h3>
                            <!-- Three Dots Icon -->
                            <div class="shrink-0 ml-2">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-gray-600">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z" />
                                </svg>
                            </div>
                        </div>
                        <!-- Subtitle and Views -->
                        <p class="text-xs text-gray-600 mt-0.5">{{videoItem.channelName}}</p>
                        <p class="text-xs text-gray-500 mt-0.5">{{videoItem.views}} views • {{videoItem.publishedAt}}</p>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>
