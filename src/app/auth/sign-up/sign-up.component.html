<div class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-4"
  style="background-image: url('images/bg6.jpg'); background-size: cover; background-position: center;">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <img class="mx-auto h-12 w-auto" src="images/logo.png" alt="Workflow">
    <h2 class="mt-6 text-center text-3xl font-extrabold text-white">Sign Up</h2>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md p-4">
    <div class="bg-white py-8 px-4 shadow rounded-lg  sm:px-10">
      <form class="space-y-6" action="#" method="POST">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700"> Full Name </label>
          <div class="mt-1">
            <input id="full" name="full" type="text" required
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          </div>
        </div>

        <div>
          <label for="userName" class="block text-sm font-medium text-gray-700"> Username </label>
          <div class="mt-1">
            <input id="userName" name="userName" type="userName" required
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          </div>
        </div>

        <div>
          <label for="mobileNumber" class="block text-sm font-medium text-gray-700"> Mobile Number</label>
          <div class="mt-1">
            <input id="mobileNumber" name="mobileNumber" type="number" required
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700"> Email address </label>
          <div class="mt-1">
            <input id="email" name="email" type="email" autocomplete="email" required
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700"> Password </label>
          <div class="mt-1">
            <input id="password" name="password" type="password" autocomplete="current-password" required
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          </div>
        </div>

        <div>
          <button type="submit"
            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">Sign
            Up</button>
        </div>
      </form>
      <div class="mt-6">
        <div class="relative">
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-700"> Already have an account ? </span><a href="log-in"
              class="font-medium text-indigo-600 hover:text-indigo-500"> Sing In </a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
